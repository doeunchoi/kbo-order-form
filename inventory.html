<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청약 가능 현황 · TVING KBO 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tving:#E61F3C;--bg:#F7F7F5;--surface:#fff;--border:#E2E2DE;
  --text1:#111;--text2:#5A5A5A;--text3:#999;--radius:12px;--radius-sm:8px;
  --avail:#2D6A11;--avail-bg:#EAF3DE;--avail-border:#86EFAC;
  --danger:#991B1B;--danger-bg:#FFF2F2;--danger-border:#FECACA;
  --purple:#7C3AED;--purple-bg:#F5F3FF;--purple-border:#DDD6FE;
  --sm:#C2410C;--sm-bg:#FFF7ED;--sm-border:#FED7AA;
  --fd:#166534;--fd-bg:#DCFCE7;--fd-border:#86EFAC;
  --cl:#1D4ED8;--cl-bg:#EFF6FF;--cl-border:#BFDBFE;
  --gray-bg:#F9FAFB;--gray-border:#E5E7EB;--warn:#92400E;--warn-bg:#FEF3C7;
}
body{background:var(--bg);font-family:'Pretendard',-apple-system,sans-serif;font-size:14px;color:var(--text1)}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.logo-badge{background:var(--tving);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px}
.topbar-title{font-size:13px;font-weight:600;margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:10px}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.refresh-btn:hover{border-color:var(--text1)}
.refresh-btn .icon{transition:transform .5s}
.refresh-btn.loading .icon{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.updated-at{font-size:11px;color:var(--text3)}

.page{max-width:960px;margin:0 auto;padding:24px 20px 60px}

/* 섹션 구분 헤더 */
.form-type-header{padding:14px 18px;border-radius:var(--radius);margin-bottom:16px;margin-top:28px;display:flex;align-items:center;gap:10px}
.form-type-header:first-of-type{margin-top:0}
.form-type-header.exp{background:var(--tving);color:#fff}
.form-type-header.plan{background:var(--purple);color:#fff}
.form-type-header-badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.25)}
.form-type-header-title{font-size:15px;font-weight:700}
.form-type-header-sub{font-size:12px;opacity:.8;margin-left:auto}

/* 월 선택 탭 */
.month-tabs-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.month-tabs-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap}
.mtab{padding:7px 18px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;background:var(--surface);font-family:inherit;transition:all .15s;white-space:nowrap}
.mtab:hover:not(.locked){border-color:rgba(0,0,0,.25)}
.mtab.active{border-color:var(--tving);background:var(--tving);color:#fff}
.mtab.locked{opacity:.5;cursor:not-allowed;font-size:12px}

/* 서브 탭 (노출형 월선택) */
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.stab{padding:5px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;background:var(--surface);font-family:inherit;transition:all .12s}
.stab.active{border-color:var(--tving);background:var(--tving);color:#fff}

/* 노출형 상품 카드 */
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
@media(max-width:520px){.exp-grid{grid-template-columns:1fr}}
.exp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.exp-card-name{font-size:12px;font-weight:600}
.exp-card-sub{font-size:10px;color:var(--text3);margin-top:1px}
.avail-chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap}
.avail-chip.ok{background:var(--avail-bg);color:var(--avail);border:1px solid var(--avail-border)}
.avail-chip.full{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.avail-chip.notopen{background:var(--gray-bg);color:var(--text3);border:1px solid var(--gray-border)}

/* 기획형 서브섹션 */
.plan-sub-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.plan-sub-hdr{padding:9px 14px;display:flex;align-items:center;gap:8px}
.plan-sub-hdr.sm{background:var(--sm-bg);border-bottom:1px solid var(--sm-border)}
.plan-sub-hdr.fd{background:var(--fd-bg);border-bottom:1px solid var(--fd-border)}
.plan-sub-hdr.cl{background:var(--cl-bg);border-bottom:1px solid var(--cl-border)}
.plan-sub-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.plan-sub-badge.sm{background:var(--sm-bg);color:var(--sm);border:1px solid var(--sm-border)}
.plan-sub-badge.fd{background:var(--fd-bg);color:var(--fd);border:1px solid var(--fd-border)}
.plan-sub-badge.cl{background:var(--cl-bg);color:var(--cl);border:1px solid var(--cl-border)}
.plan-sub-title{font-size:12px;font-weight:700}
.plan-sub-desc{font-size:11px;color:var(--text3);margin-left:auto}
.plan-sub-body{padding:12px 14px}

/* 6개월 캘린더 그리드 */
.six-cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.six-cal-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.six-cal-grid{grid-template-columns:1fr}}
.mini-month{background:var(--gray-bg);border-radius:var(--radius-sm);padding:10px}
.mini-month-title{font-size:11px;font-weight:700;text-align:center;margin-bottom:8px;color:var(--text2)}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-lbl{font-size:8px;text-align:center;color:var(--text3);padding:2px 0;font-weight:600}
.mc-lbl:first-child{color:#EF4444}
.mc-lbl:last-child{color:#3B82F6}
.mc-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;line-height:1;transition:all .1s}
.mc-cell.empty,.mc-cell.past{opacity:.15;cursor:default;background:transparent;color:var(--text3)}
.mc-cell.noshow{background:#F3F4F6;color:#D1D5DB}
.mc-cell.avail{background:var(--avail-bg);color:var(--avail);font-weight:700;cursor:pointer}
.mc-cell.avail:hover{filter:brightness(.88);transform:scale(1.15)}
.mc-cell.full{background:var(--danger-bg);color:var(--danger);font-weight:600;cursor:pointer}
.mc-cell.full:hover{filter:brightness(.93)}

/* 날짜 상세 팝업 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:190;display:none}
.overlay.show{display:block}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:340px;max-width:92vw;z-index:200;box-shadow:0 20px 60px rgba(0,0,0,.18);display:none}
.popup.show{display:block}
.popup-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.popup-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px 6px}
.popup-table{width:100%;border-collapse:collapse}
.popup-table th{font-size:11px;font-weight:600;color:var(--text2);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border)}
.popup-table td{font-size:12px;padding:6px 8px;border-bottom:1px solid var(--border)}
.popup-table tr:last-child td{border-bottom:none}

/* 범례 */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.legend-dot{width:12px;height:12px;border-radius:3px}

/* 빅가상광고 / 클립 단순 카드 */
.simple-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.simple-card-left .name{font-size:12px;font-weight:600}
.simple-card-left .sub{font-size:10px;color:var(--text3);margin-top:1px}

/* 접수 전 안내 */
.not-open-box{background:var(--gray-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;color:var(--text3);font-size:13px}

/* 노출형 서브 타이틀 */
.exp-sub-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.04em;margin-bottom:6px;padding-left:2px;display:flex;align-items:center;gap:4px}
.exp-sub-title::before{content:'';width:3px;height:12px;background:var(--tving);border-radius:2px;display:inline-block}

/* 주차 4칸 그리드 */
.week-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
@media(max-width:520px){.week-grid-4{grid-template-columns:repeat(2,1fr)}}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.week-card-label{font-size:12px;font-weight:700;color:var(--text1)}
.week-card-range{font-size:10px;color:var(--text3);line-height:1.4}

/* 구단 10칸 그리드 */
.team-grid-10{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
@media(max-width:520px){.team-grid-10{grid-template-columns:repeat(3,1fr)}}
.team-avail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 6px;display:flex;flex-direction:column;align-items:center;gap:4px}
.team-name{font-size:12px;font-weight:700;color:var(--text1)}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center">
    <span class="logo-badge">TVING</span>
    <span class="topbar-title">KBO 2026 청약 가능 현황</span>
  </div>
  <div class="topbar-right">
    <span class="updated-at" id="updated-at">—</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
      <svg class="icon" width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 1 .6 2.6M2 8V4m0 4H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>새로고침
    </button>
  </div>
</div>

<!-- 팝업 -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
  <div class="popup-title"><span id="popup-title-text">—</span><button class="popup-close" onclick="closePopup()">✕</button></div>
  <table class="popup-table"><thead><tr><th>상품</th><th>현황</th></tr></thead><tbody id="popup-body"></tbody></table>
</div>

<div class="page" id="page-content">
  <div class="skeleton" style="height:200px"></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/tving.com/s/AKfycbwSOtY2kxxTnKiwAf1fDLeEwRrbOo1U_IUqcb0cpyG0oJCx2x5TlTA3WGMa71gzKc01lQ/exec';
const DAY_KO = ['일','월','화','수','목','금','토'];
function pad2(n){return String(n).padStart(2,'0')}

// 월 설정
const MONTH_CFG = [
  {key:'2026-05', label:'5월', openAt:new Date(2026,3,15,10,0,0)},
  {key:'2026-06', label:'6월', openAt:new Date(2026,4,20,10,0,0)},
  {key:'2026-07', label:'7월', openAt:new Date(2026,5,17,10,0,0)},
  {key:'2026-08', label:'8월', openAt:new Date(2026,6,15,10,0,0)},
  {key:'2026-09', label:'9월', openAt:new Date(2026,7,19,10,0,0)},
];

// 노출형 상품
const EXP_PRODS = [
  {code:'노출보장PKG',          label:'노출 보장 PKG',            monthQuota:99},
  {code:'노출보장PKG(제한업종)', label:'노출 보장 PKG (제한업종)', monthQuota:99},
  {code:'퍼스트뷰PKG',          label:'1주 퍼스트뷰 독점 PKG',    monthQuota:4},
  {code:'7이닝장초수독점PKG',   label:'7이닝 장초수 독점 PKG',    monthQuota:1},
  {code:'1주집중임팩트PKG',     label:'1주 집중 임팩트 PKG',      monthQuota:99},
  {code:'팬덤PKG',              label:'팬덤 PKG (구단 타겟팅)',    monthQuota:50},
];

const SM_WEEKDAYS = [2,5];
const FD_WEEKDAYS = [6,0];
const SEASON_MONTHS = ['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09'];

let INV_DATA  = [];
let EXP_DATA  = {};
let expSelMonth = null; // 노출형 선택된 월

// ── 데이터 로드 ──
async function loadData(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  try{
const res = await fetch(
  `${APPS_SCRIPT_URL}?action=inventory&_=${Date.now()}`,
  { redirect: 'follow' }
);
    if(!res.ok) throw new Error();
    const data = await res.json();
    if(data.ok){
      INV_DATA = data.inventory||[];
      EXP_DATA = data.expMonthly||{};
      document.getElementById('updated-at').textContent='업데이트: '+new Date(data.ts).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }
  }catch{
    generateDummy();
    document.getElementById('updated-at').textContent='미리보기 (Apps Script 미연결)';
  }
  btn.classList.remove('loading');
  // 노출형 기본 월: 현재 열려있는 첫 번째 월
  if(!expSelMonth){
    const now=new Date();
    const firstOpen = MONTH_CFG.find(mc=>now>=mc.openAt);
    expSelMonth = firstOpen ? firstOpen.key : MONTH_CFG[0].key;
  }
  render();
}

function generateDummy(){
  INV_DATA=[];EXP_DATA={};
  const smP=['sm_ppl','sm_main_display','sm_title_id'];
  const fdP=['fd_ppl','fd_fullframe_vr','fd_sponsor','fd_title_id'];
  const teams=['LG','두산','KT','SSG','NC','삼성','한화','롯데','기아','키움'];
  for(let m=4;m<=9;m++){
    const mk=`2026-${pad2(m)}`;
    const days=new Date(2026,m,0).getDate();
    for(let d=1;d<=days;d++){
      const dt=new Date(2026,m-1,d),dow=dt.getDay();
      const ymd=`${mk}-${pad2(d)}`;
      if(SM_WEEKDAYS.includes(dow)) smP.forEach(code=>{const rsv=Math.random()<.25?1:0;INV_DATA.push({code,cat:'슈퍼매치',date:ymd,total:1,reserved:rsv,remaining:1-rsv})});
      if(FD_WEEKDAYS.includes(dow)) fdP.forEach(code=>{const rsv=Math.random()<.2?1:0;INV_DATA.push({code,cat:'팬덤중계',date:ymd,total:1,reserved:rsv,remaining:1-rsv})});
    }
    const bvR=Math.floor(Math.random()*7);
    INV_DATA.push({code:'sm_big_vr',cat:'슈퍼매치',date:mk,total:6,reserved:bvR,remaining:6-bvR});
    const clipR=Math.random()<.3?1:0;
    INV_DATA.push({code:'clip_monthly',cat:'클립',date:mk,total:1,reserved:clipR,remaining:1-clipR});

    // 노출형 더미 — 일반 구좌상품
    if(m>=5){
      if(Math.random()<.15) EXP_DATA[`${mk}__7이닝장초수독점PKG`]=1; // 간혹 마감
      // 퍼스트뷰: 주차별 독점
      for(let w=1;w<=4;w++){
        if(Math.random()<.3) EXP_DATA[`${mk}__퍼스트뷰PKG__${w}주차`]=1;
      }
      // 팬덤PKG: 구단별
      teams.forEach(team=>{
        const used=Math.floor(Math.random()*6);
        if(used>0) EXP_DATA[`${mk}__팬덤PKG__${team}`]=used;
      });
    }
  }
}

// ── 전체 렌더 ──
function render(){
  const now=new Date();
  let html='';

  // ════ 노출형 섹션 ════
  html+=`<div class="form-type-header exp">
    <span class="form-type-header-badge">노출형</span>
    <span class="form-type-header-title">노출형 광고 — KBO STANDARD AD</span>
    <span class="form-type-header-sub">월별 청약 | 생중계·클립 인스트림</span>
  </div>`;

  // 노출형 월 탭
  const openMonths = MONTH_CFG.filter(mc=>now>=mc.openAt);
  const upcomingMonths = MONTH_CFG.filter(mc=>now<mc.openAt);
  if(openMonths.length===0){
    html+=`<div class="not-open-box">아직 접수 개시 전입니다.</div>`;
  } else {
    html+=`<div class="month-tabs-wrap"><div class="month-tabs-label">청약월 선택</div><div class="month-tabs">`;
    MONTH_CFG.forEach(mc=>{
      const isOpen=now>=mc.openAt, isSel=expSelMonth===mc.key;
      html+=`<button class="mtab${isSel?' active':''}${!isOpen?' locked':''}" onclick="${isOpen?`setExpMonth('${mc.key}')`:''}">
        ${mc.label}${!isOpen?'<span style="font-size:10px;font-weight:400;opacity:.7;margin-left:3px">접수예정</span>':''}
      </button>`;
    });
    html+=`</div></div>`;
    html+=renderExpProducts();
  }

  // ════ 기획형 섹션 ════
  html+=`<div class="form-type-header plan" style="margin-top:36px">
    <span class="form-type-header-badge">기획형</span>
    <span class="form-type-header-title">기획형 광고 — KBO DEEP-ENGAGEMENT AD</span>
    <span class="form-type-header-sub">정규시즌(4~9월) 상시 청약</span>
  </div>`;

  // 슈퍼매치
  html+=`<div class="plan-sub-section">
    <div class="plan-sub-hdr sm">
      <span class="plan-sub-badge sm">슈퍼매치</span>
      <span class="plan-sub-title">슈퍼매치 일점유 상품</span>
      <span class="plan-sub-desc">화·금 편성 · 날짜 클릭 시 상세 확인</span>
    </div>
    <div class="plan-sub-body">
      ${renderSixMonthCal('sm')}
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--avail-bg);border:1px solid var(--avail)"></div>청약 가능</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--danger-bg);border:1px solid var(--danger)"></div>청약 마감</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F3F4F6"></div>편성 없음</div>
      </div>
    </div>
  </div>`;

  // 슈퍼매치 빅가상광고
  html+=`<div class="plan-sub-section">
    <div class="plan-sub-hdr sm">
      <span class="plan-sub-badge sm">슈퍼매치</span>
      <span class="plan-sub-title">빅 가상광고</span>
      <span class="plan-sub-desc">월별 청약 가능 여부</span>
    </div>
    <div class="plan-sub-body">${renderBigVr()}</div>
  </div>`;

  // 팬덤중계
  html+=`<div class="plan-sub-section">
    <div class="plan-sub-hdr fd">
      <span class="plan-sub-badge fd">팬덤중계</span>
      <span class="plan-sub-title">팬덤중계 일점유 상품</span>

// ── 노출형 상품 ──
const TEAMS = ['LG','두산','KT','SSG','NC','삼성','한화','롯데','기아','키움'];

// 해당 월의 주차 기간 계산 (MONTHS_CONFIG의 seasonStart 기준)
// seasonStart 없으면 해당 월 1일 기준으로 월~일 4주 산출
function getWeeks(monthKey){
  // 각 월 시즌 시작일 (노출형 청약 폼의 MONTHS_CONFIG와 동일)
  const seasonStarts = {
    '2026-05': new Date(2026,4,4),
    '2026-06': new Date(2026,5,1),
    '2026-07': new Date(2026,6,6),
    '2026-08': new Date(2026,7,3),
    '2026-09': new Date(2026,8,7),
    '2026-10': new Date(2026,9,5),
  };
  const start = seasonStarts[monthKey] || new Date(monthKey+'-01');
  const weeks = [];
  const DAY=['일','월','화','수','목','금','토'];
  for(let w=0;w<4;w++){
    const mon = new Date(start); mon.setDate(mon.getDate()+w*7);
    const sun = new Date(mon);   sun.setDate(sun.getDate()+6);
    const fmt = d=>`${d.getMonth()+1}/${d.getDate()}(${DAY[d.getDay()]})`;
    weeks.push({label:`${w+1}주차`, range:`${fmt(mon)} ~ ${fmt(sun)}`});
  }
  return weeks;
}

    const key=`${expSelMonth}__${p.code}`, used=EXP_DATA[key]||0;

      <div><div class="exp-card-name">${p.label}</div><div class="exp-card-sub">${p.sub}</div></div>
      <span class="avail-chip ${isFull?'full':'ok'}">${isFull?'청약 마감':'청약 가능'}</span>
    </div>`;

  // ── 2. 퍼스트뷰 독점 PKG — 주차별 ──

  html += `<div class="week-grid-4">`;
  weeks.forEach((wk,i)=>{
    const key=`${expSelMonth}__퍼스트뷰PKG__${i+1}주차`;

    html+=`<div class="week-card ${isFull?'full':''}">
      <div class="week-card-label">${wk.label}</div>

      <span class="avail-chip ${isFull?'full':'ok'}" style="margin-top:8px;font-size:10px">${isFull?'마감':'가능'}</span>
    </div>`;
  });
  html += `</div>`;

  // ── 3. 1주 집중 임팩트 PKG — 주차별 ──
  html += `<div class="exp-sub-title" style="margin-top:18px">1주 집중 임팩트 PKG <span style="font-size:11px;font-weight:400;color:var(--text3);margin-left:6px">주당 구좌 수 제한</span></div>`;

    const key=`${expSelMonth}__1주집중임팩트PKG__${i+1}주차`;

function setExpMonth(key){expSelMonth=key;render()}

// ── 6개월 캘린더 ──
function renderSixMonthCal(prefix){
  const weekdays = prefix==='sm' ? SM_WEEKDAYS : FD_WEEKDAYS;
  const smProds=[
    {codes:['sm_ppl','sm_ppl_plan','sm_ppl_event','sm_ppl_func','sm_ppl_simple'], label:'PPL (기획/이벤트/기능/단순)'},
    {codes:['sm_main_display'],label:'메인 디스플레이 PPL'},
    {codes:['sm_title_id'],    label:'타이틀 브랜드 ID'},
  ];
  const fdProds=[
    {codes:['fd_ppl','fd_ppl_plan','fd_ppl_event','fd_ppl_func','fd_ppl_simple'],label:'PPL (기획/이벤트/기능/단순)'},
    {codes:['fd_fullframe_vr'],label:'풀프레임 가상광고'},
    {codes:['fd_sponsor'],     label:'협찬고지'},
    {codes:['fd_title_id'],    label:'타이틀 브랜드 ID'},
  ];
  const products = prefix==='sm' ? smProds : fdProds;

  const today=new Date(); today.setHours(0,0,0,0);
  let html=`<div class="six-cal-grid">`;

  SEASON_MONTHS.forEach(mk=>{
    const [y,m]=mk.split('-').map(Number);
    const firstDay=new Date(y,m-1,1), lastDay=new Date(y,m,0);
    const startDow=firstDay.getDay();
    let cells='';
    for(let i=0;i<startDow;i++) cells+=`<div class="mc-cell empty"></div>`;

    for(let d=1;d<=lastDay.getDate();d++){
      const dt=new Date(y,m-1,d), dow=dt.getDay();
      const ymd=`${mk}-${pad2(d)}`;
      const isPast=dt<today, isWeekday=weekdays.includes(dow);
      if(isPast||!isWeekday){
        cells+=`<div class="mc-cell ${isPast?'past':'noshow'}">${isWeekday?d:''}</div>`;
        continue;
      }
      // 해당 날짜의 모든 상품 중 하나라도 available이면 avail
      let anyAvail=false, anyFull=false;
      products.forEach(prod=>{
        prod.codes.forEach(code=>{
          const inv=INV_DATA.find(x=>x.code===code&&x.date===ymd);
          if(inv){if(inv.remaining>0)anyAvail=true;else anyFull=true;}
        });
      });
      const cls = anyAvail ? 'avail' : (anyFull ? 'full' : 'noshow');
      cells+=`<div class="mc-cell ${cls}" onclick="showDayDetail('${ymd}','${prefix}')" title="${ymd}">${d}</div>`;
    }
    html+=`<div class="mini-month">
      <div class="mini-month-title">${m}월</div>
      <div class="mini-cal-grid">
        <div class="mc-lbl">일</div><div class="mc-lbl">월</div><div class="mc-lbl">화</div><div class="mc-lbl">수</div><div class="mc-lbl">목</div><div class="mc-lbl">금</div><div class="mc-lbl">토</div>
        ${cells}
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// ── 빅가상광고 ──
function renderBigVr(){
  let html='';

  });
  return html;
}

// ── 클립 범퍼 (1개월 독점 현황만) ──
function renderClip(){
  const now=new Date();
  let html='';
  SEASON_MONTHS.forEach(mk=>{
    const [y,m]=mk.split('-').map(Number);
    const monthEnd=new Date(y,m,0);
    if(monthEnd<now) return; // 지난 월 숨김
    const inv=INV_DATA.find(d=>d.code==='clip_monthly'&&d.date===mk);
    const isAvail=!inv||inv.remaining>0;
    html+=`<div class="simple-card"><div class="simple-card-left"><div class="name">2026년 ${m}월 — 1개월 독점</div><div class="sub">1억원 (VAT 별도) · 전체 하이라이트 클립 인트로</div></div><span class="avail-chip ${isAvail?'ok':'full'}">${isAvail?'청약 가능':'청약 마감'}</span></div>`;
  });
  if(!html) html=`<div class="not-open-box" style="font-size:12px">현재 집행 가능한 월이 없습니다.</div>`;
  return html;
}

// ── 날짜 상세 팝업 ──
function showDayDetail(ymd, prefix){
  const dow=DAY_KO[new Date(ymd+'T00:00:00').getDay()];
  document.getElementById('popup-title-text').textContent=`${ymd} (${dow})`;
  const smProds=[
    {codes:['sm_ppl','sm_ppl_plan','sm_ppl_event','sm_ppl_func','sm_ppl_simple'],label:'PPL (기획/이벤트/기능/단순)'},
    {codes:['sm_main_display'],label:'메인 디스플레이 PPL'},
    {codes:['sm_title_id'],    label:'타이틀 브랜드 ID'},
  ];
  const fdProds=[
    {codes:['fd_ppl','fd_ppl_plan','fd_ppl_event','fd_ppl_func','fd_ppl_simple'],label:'PPL (기획/이벤트/기능/단순)'},
    {codes:['fd_fullframe_vr'],label:'풀프레임 가상광고'},
    {codes:['fd_sponsor'],     label:'협찬고지'},
    {codes:['fd_title_id'],    label:'타이틀 브랜드 ID'},
  ];
  const prods=prefix==='sm'?smProds:fdProds;
  const rows=prods.map(prod=>{
    let rem=0,found=false;
    INV_DATA.forEach(inv=>{if(prod.codes.some(c=>inv.code===c||inv.code.startsWith(c))&&inv.date===ymd){found=true;rem+=inv.remaining}});
    const chip=!found?'<span style="color:var(--text3)">편성 없음</span>'
      :(rem>0?`<span style="color:var(--avail);font-weight:700">청약 가능</span>`:`<span style="color:var(--danger);font-weight:700">청약 마감</span>`);
    return `<tr><td>${prod.label}</td><td>${chip}</td></tr>`;
  }).join('');
  document.getElementById('popup-body').innerHTML=rows;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('popup').classList.add('show');
}
function closePopup(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('popup').classList.remove('show');
}
